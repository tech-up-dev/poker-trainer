name: CI

# Lint and build on every PR and on pushes to the long-lived branches. The build
# step runs `tsc -b` before `vite build`, so this also type-checks the app.
on:
  pull_request:
    branches: [dev, master]
  push:
    branches: [dev, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ci (not install) so the lockfile is the source of truth and the build
      # fails if package.json and package-lock.json have drifted apart.
      - run: npm ci

      - run: npm run lint

      - run: npm run build
